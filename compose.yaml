# [인프라 구성] mk3-api + mk3-web + MongoDB + Qdrant 컨테이너를 정의하는 Docker Compose 파일
# 메인 프론트는 mk2를 유지하고, mk3-web은 Vue/Nuxt 학습용 보조 UI로 분리 운영

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: personal-operating-system-mk3-api:latest
    container_name: personal-operating-system-mk3-api
    env_file:
      - backend/.env
    environment:
      MONGODB_URL: mongodb://${MK3_MONGO_USERNAME:-pos}:${MK3_MONGO_PASSWORD:-pos}@mongodb:27017
      MONGODB_DB: ${MK3_MONGO_DB:-pos_mk3}
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      # 컨테이너 내부에서 mk2 auth-service(호스트:3002)로 접근
      AUTH_SERVICE_URL: http://host.docker.internal:3002
    ports:
      - "8001:8001"
    depends_on:
      mongodb:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    image: personal-operating-system-mk3-web:latest
    container_name: personal-operating-system-mk3-web
    environment:
      # 브라우저에서는 localhost 기준으로 호출, SSR(web 컨테이너)에서는 내부 네트워크 주소로 호출
      NUXT_PUBLIC_API_BASE: http://localhost:8001
      NUXT_API_BASE_SERVER: http://api:8001
    ports:
      - "3003:3000"
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped

  mongodb:
    image: mongo:7
    container_name: personal-operating-system-mk3-mongodb
    # 환경변수는 .env 파일에서 읽으며, 없으면 :- 뒤의 기본값 사용
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MK3_MONGO_USERNAME:-pos}
      MONGO_INITDB_ROOT_PASSWORD: ${MK3_MONGO_PASSWORD:-pos}
      MONGO_INITDB_DATABASE: ${MK3_MONGO_DB:-pos_mk3}
      TZ: ${MK3_TZ:-Asia/Seoul}
    # "외부바인딩IP:호스트포트:컨테이너포트" 형식 (기본: localhost에서만 접근 가능)
    ports:
      - "${MK3_MONGO_BIND:-127.0.0.1}:${MK3_MONGO_PORT:-27017}:27017"
    volumes:
      - personal-operating-system-mk3-mongodb-data:/data/db  # 컨테이너 삭제 후에도 데이터 유지
    healthcheck:
      # 컨테이너가 실제로 요청을 처리할 수 있는 상태인지 주기적으로 확인
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping').ok", "--quiet"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped  # 수동으로 중지하지 않는 한 항상 자동 재시작

  qdrant:
    image: qdrant/qdrant:v1.14.1
    container_name: personal-operating-system-mk3-qdrant
    ports:
      - "${MK3_QDRANT_HTTP_PORT:-6333}:6333"  # HTTP REST API
      - "${MK3_QDRANT_GRPC_PORT:-6334}:6334"  # gRPC API (고성능 통신용)
    volumes:
      - personal-operating-system-mk3-qdrant-data:/qdrant/storage
    healthcheck:
      # /dev/tcp로 포트 개방 여부만 확인 (curl 없이 bash 내장 기능 활용)
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  personal-operating-system-mk3-mongodb-data:
  personal-operating-system-mk3-qdrant-data:
