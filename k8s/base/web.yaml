apiVersion: v1
kind: Service
metadata:
  name: mk3-web
spec:
  selector:
    app: mk3-web
  ports:
    - name: http
      port: 3000
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mk3-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mk3-web
  template:
    metadata:
      labels:
        app: mk3-web
    spec:
      containers:
        - name: web
          image: personal-operating-system-mk3-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: NUXT_PUBLIC_API_BASE
              valueFrom:
                configMapKeyRef:
                  name: mk3-config
                  key: NUXT_PUBLIC_API_BASE
            - name: NUXT_API_BASE_SERVER
              valueFrom:
                configMapKeyRef:
                  name: mk3-config
                  key: NUXT_API_BASE_SERVER
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 40
            periodSeconds: 20
