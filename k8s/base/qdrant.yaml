apiVersion: v1
kind: Service
metadata:
  name: mk3-qdrant
spec:
  selector:
    app: mk3-qdrant
  ports:
    - name: http
      port: 6333
      targetPort: 6333
    - name: grpc
      port: 6334
      targetPort: 6334
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mk3-qdrant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mk3-qdrant
  template:
    metadata:
      labels:
        app: mk3-qdrant
    spec:
      containers:
        - name: qdrant
          image: qdrant/qdrant:v1.14.1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 6333
            - containerPort: 6334
          env:
            - name: QDRANT__SERVICE__API_KEY
              valueFrom:
                secretKeyRef:
                  name: mk3-secret
                  key: QDRANT_API_KEY
          volumeMounts:
            - name: qdrant-data
              mountPath: /qdrant/storage
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: qdrant-data
          persistentVolumeClaim:
            claimName: mk3-qdrant-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mk3-qdrant-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
